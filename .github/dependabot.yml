version: 2
updates:
  # --- 1. JS / TS (pnpm monorepo) ---
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
    groups:
      eslint-ecosystem:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "eslint-plugin-*"
          - "eslint-config-*"
      react-ecosystem:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
    ignore:
      - dependency-name: typescript
        update-types: ["version-update:semver-major"]
      - dependency-name: vite
        update-types: ["version-update:semver-major"]
      - dependency-name: zod
        update-types: ["version-update:semver-major"]
      - dependency-name: react
        update-types: ["version-update:semver-major"]
      - dependency-name: react-dom
        update-types: ["version-update:semver-major"]
      - dependency-name: eslint
        update-types: ["version-update:semver-major"]
      - dependency-name: "@eslint/*"
        update-types: ["version-update:semver-major"]

  # --- 2. Rust / Cargo (Tauri Desktop App) ---
  - package-ecosystem: cargo
    directory: "/apps/desktop/src-tauri"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(deps-rs)"

  # --- 3. Docker Base Images ---
  - package-ecosystem: docker
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    commit-message:
      prefix: "build(docker)"

  # --- 4. GitHub Actions Workflows ---
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(ci)"
    groups:
      github-actions:
        patterns:
          - "*"
