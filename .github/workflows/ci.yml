name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  # GitHub Actions JS runtime: Node 20 deprecated on runners (2026+).
  # https://github.blog/changelog/2025-09-19-deprecation-of-node-20-on-github-actions-runners/
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: lint-types-test-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check types
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Migrate legacy dry-run (M9)
        run: |
          pnpm migrate:legacy -- --input docs/examples/legacy/database.sample.json --dry-run
          pnpm migrate:legacy -- --input docs/examples/legacy/database.typical.json --dry-run

      - name: Build
        run: pnpm build

  docker:
    name: compose-build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Compose build
        run: docker compose build

      - name: Compose health smoke
        run: |
          # Image runs as node (uid 1000); bind-mounted ./data from the runner must be writable.
          mkdir -p data/library data/projects data/logs
          chmod -R a+rwX data
          docker compose up -d
          # Wait for healthcheck to pass (up to 40s)
          for i in $(seq 1 8); do
            sleep 5
            STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$(docker compose ps -q stagesync)" 2>/dev/null || echo "missing")
            echo "health: $STATUS"
            if [ "$STATUS" = "healthy" ]; then break; fi
          done
          curl -sf http://localhost:4000/api/health || (docker compose logs && exit 1)
          docker compose down

  tauri-smoke:
    name: tauri-cargo-check
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system deps (Tauri)
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev build-essential curl wget file \
            libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Stub sidecar externalBin (cargo check only)
        working-directory: apps/desktop/src-tauri
        run: |
          triple=$(rustc --print host-tuple)
          mkdir -p bin
          printf '#!/bin/sh\nexit 0\n' > "bin/stagesync-host-${triple}"
          chmod +x "bin/stagesync-host-${triple}"

      - name: Cargo check (desktop shell)
        working-directory: apps/desktop/src-tauri
        run: cargo check
