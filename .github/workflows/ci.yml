name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs of the same pipeline when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: lint-types-test-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check types
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Migrate legacy dry-run (M9)
        run: |
          pnpm migrate:legacy -- --input docs/examples/legacy/database.sample.json --dry-run
          pnpm migrate:legacy -- --input docs/examples/legacy/database.typical.json --dry-run

      - name: Build
        run: pnpm build

  docker:
    name: compose-build
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compose build
        run: docker compose build

      - name: Compose health smoke
        run: |
          # Image runs as node (uid 1000); bind-mounted ./data from the runner must be writable.
          mkdir -p data/library data/projects data/logs
          chmod -R a+rwX data
          docker compose up -d
          # Wait for healthcheck (up to ~2 min on slow runners)
          STATUS="missing"
          for i in $(seq 1 24); do
            sleep 5
            CID=$(docker compose ps -q stagesync 2>/dev/null || true)
            if [ -z "$CID" ]; then
              STATUS="missing"
            else
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CID" 2>/dev/null || echo "missing")
            fi
            echo "health attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              break
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "container reported unhealthy"
              docker compose logs
              exit 1
            fi
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "timed out waiting for healthy (last=$STATUS)"
            docker compose logs
            exit 1
          fi
          curl -sf http://localhost:4000/api/health || (docker compose logs && exit 1)
          docker compose down

  tauri-smoke:
    name: tauri-cargo-check
    if: ${{ !startsWith(github.head_ref, 'dependabot/') }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install system deps (Tauri)
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            sudo apt-get update -y && \
              sudo apt-get install -y --no-install-recommends \
                libwebkit2gtk-4.1-dev build-essential curl wget file \
                libxdo-dev libssl-dev libayatana-appindicator3-dev librsvg2-dev \
              && break
            echo "apt attempt $attempt failed; retrying…"
            sleep $((attempt * 5))
            if [ "$attempt" -eq 3 ]; then exit 1; fi
          done

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      # Cache Cargo / Rust dependencies
      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Stub sidecar bundle inputs (cargo check only)
        run: |
          sed -i.bak \
            -e 's|^apps/desktop/src-tauri/resources/|# ci-stub: apps/desktop/src-tauri/resources/|' \
            -e 's|^apps/desktop/src-tauri/bin/|# ci-stub: apps/desktop/src-tauri/bin/|' \
            -e 's|^apps/desktop/src-tauri/lib/|# ci-stub: apps/desktop/src-tauri/lib/|' \
            -e 's|^apps/desktop/src-tauri/share/|# ci-stub: apps/desktop/src-tauri/share/|' \
            .gitignore

          triple=$(rustc --print host-tuple)
          root=apps/desktop/src-tauri
          mkdir -p "$root/bin" "$root/resources/sidecar/web" "$root/resources/sidecar/seed" "$root/resources/sidecar/server/dist" "$root/lib" "$root/share"
          printf '#!/bin/sh\nexit 0\n' > "$root/bin/stagesync-host-${triple}"
          chmod +x "$root/bin/stagesync-host-${triple}"
          touch "$root/resources/sidecar/server/dist/index.js" "$root/lib/.keep" "$root/share/.keep"

      - name: Cargo check (desktop shell)
        working-directory: apps/desktop/src-tauri
        run: cargo check
