name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel previous runs of the same pipeline when a new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  changes:
    name: path-filter
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Detect web src changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - 'apps/web/src/**'
              - 'apps/web/e2e/**'
              - 'apps/web/package.json'
              - 'apps/web/playwright.config.*'

  build:
    name: lint-types-test-build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check types
        run: pnpm check-types

      - name: Test
        run: pnpm test

      - name: Coverage (shared + server + web + ui)
        run: pnpm test:coverage

      # Separate uploads so Codecov flags map 1:1 to packages (see codecov.yml).
      - name: Upload coverage (shared)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: packages/shared/coverage/lcov.info
          flags: shared
          name: shared

      - name: Upload coverage (server)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: apps/server/coverage/lcov.info
          flags: server
          name: server

      - name: Upload coverage (web)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: apps/web/coverage/lcov.info
          flags: web
          name: web

      - name: Upload coverage (ui)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: true
          disable_search: true
          files: packages/ui/coverage/lcov.info
          flags: ui
          name: ui

      - name: Migrate legacy dry-run (M9)
        run: |
          pnpm migrate:legacy -- --input docs/examples/legacy/database.sample.json --dry-run
          pnpm migrate:legacy -- --input docs/examples/legacy/database.typical.json --dry-run

      - name: Build
        run: pnpm build

  # Phase 6 scaffolding: path-filter + stub. Real Forma drag E2E → docs/TODO.md.
  playwright:
    name: playwright-smoke
    needs: changes
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'pull_request' && needs.changes.outputs.web == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Playwright Forma smoke (stub)
        run: |
          echo "::notice::Playwright Forma drag E2E not implemented yet — see apps/web/e2e/README.md and docs/TODO.md"
          echo "CI scaffolding OK (path-filter gated). Replace this step with pnpm exec playwright test when ready."

  docker:
    name: compose-build
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compose build
        run: docker compose build

      - name: Compose health smoke
        run: |
          # Image runs as node (uid 1000); bind-mounted ./data from the runner must be writable.
          mkdir -p data/library data/projects data/logs
          chmod -R a+rwX data
          docker compose up -d
          # Wait for healthcheck (up to ~2 min on slow runners)
          STATUS="missing"
          for i in $(seq 1 24); do
            sleep 5
            CID=$(docker compose ps -q stagesync 2>/dev/null || true)
            if [ -z "$CID" ]; then
              STATUS="missing"
            else
              STATUS=$(docker inspect --format='{{.State.Health.Status}}' "$CID" 2>/dev/null || echo "missing")
            fi
            echo "health attempt $i: $STATUS"
            if [ "$STATUS" = "healthy" ]; then
              break
            fi
            if [ "$STATUS" = "unhealthy" ]; then
              echo "container reported unhealthy"
              docker compose logs
              exit 1
            fi
          done
          if [ "$STATUS" != "healthy" ]; then
            echo "timed out waiting for healthy (last=$STATUS)"
            docker compose logs
            exit 1
          fi
          curl -sf http://localhost:4000/api/health || (docker compose logs && exit 1)
          docker compose down
