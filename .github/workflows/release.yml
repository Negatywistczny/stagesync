name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 5.0.0-alpha.11) — no git commit"
        required: true
        default: "5.0.0-alpha.11"
      publish:
        description: "Create/publish GitHub Release (false = build artifacts only)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/negatywistczny/stagesync
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-version:
    name: resolve-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

  docker:
    name: docker-ghcr
    runs-on: ubuntu-latest
    needs: resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-draft-release:
    name: create-draft-release
    runs-on: ubuntu-latest
    needs: resolve-version
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Create draft GitHub Release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION }}"
          REPO="${{ github.repository }}"
          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — reusing for asset upload"
          else
            gh release create "$TAG" \
              -R "$REPO" \
              --draft \
              --title "StageSync $TAG" \
              --notes "Release build in progress."
          fi
          ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq .id)
          echo "release_id=$ID" >> "$GITHUB_OUTPUT"

  tauri-macos:
    name: tauri-macos-dmg
    runs-on: macos-latest
    needs: [resolve-version, create-draft-release]
    if: always() && needs.resolve-version.result == 'success' && (needs.create-draft-release.result == 'success' || needs.create-draft-release.result == 'skipped')
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version into files
        run: node launch/scripts/sync-version.mjs --version ${{ env.VERSION }}

      - name: Build desktop sidecar (Node + server + web)
        run: node launch/scripts/build-desktop-sidecar.mjs --target aarch64-apple-darwin --smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri (macOS — dmg + updater)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true
          releaseId: ${{ (github.event_name == 'push' || inputs.publish) && needs.create-draft-release.outputs.release_id || '' }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  tauri-windows:
    name: tauri-windows-msi
    runs-on: windows-latest
    needs: [resolve-version, create-draft-release]
    if: always() && needs.resolve-version.result == 'success' && (needs.create-draft-release.result == 'success' || needs.create-draft-release.result == 'skipped')
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare Windows paths (WiX)
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          subst X: $env:GITHUB_WORKSPACE
          "GITHUB_WORKSPACE=X:\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version into files
        run: node launch/scripts/sync-version.mjs --version ${{ env.VERSION }} --wix-compat

      - name: Build desktop sidecar (Node + server + web)
        run: node launch/scripts/build-desktop-sidecar.mjs --target x86_64-pc-windows-msvc --smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri (Windows — msi + updater)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true
          releaseId: ${{ (github.event_name == 'push' || inputs.publish) && needs.create-draft-release.outputs.release_id || '' }}

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [resolve-version, docker, create-draft-release, tauri-macos, tauri-windows]
    # Tag push always publishes; workflow_dispatch publishes only when inputs.publish is true.
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum *.dmg *.msi > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ env.VERSION }}"
          REPO="${{ github.repository }}"
          gh release upload "$TAG" dist/SHA256SUMS.txt -R "$REPO" --clobber

          PRERELEASE_FLAG=""
          if [[ "${{ env.VERSION }}" == *-* ]]; then
            PRERELEASE_FLAG="--prerelease"
          else
            PRERELEASE_FLAG="--latest"
          fi

          gh release edit "$TAG" \
            -R "$REPO" \
            --draft=false \
            --title "StageSync v${{ env.VERSION }}" \
            $PRERELEASE_FLAG \
            --notes "$(cat <<EOF
          ## StageSync v${{ env.VERSION }}

          ### Desktop standalone (operator)
          Pobierz instalator dla swojej platformy poniżej.
          Aktualizacja in-app: Admin → O aplikacji → **Sprawdź aktualizacje** (wymaga \`latest.json\` + podpisanych bundle na tym release).
          Instalacja bez podpisu: [DESKTOP.md](https://github.com/Negatywistczny/stagesync/blob/main/docs/DESKTOP.md).
          Po uruchomieniu aplikacja startuje lokalny serwer wbudowanym Node sidecarem (bez potrzeby Dockera/Node u użytkownika).

          ---
          Pełna instrukcja: [INSTALL.md](https://github.com/Negatywistczny/stagesync/blob/main/docs/INSTALL.md)

          ### Docker (serwer / scena — ścieżka drugorzędna)
          \`\`\`sh
          docker login ghcr.io
          STAGESYNC_VERSION=${{ env.VERSION }} docker compose -f compose.prod.yml up -d
          \`\`\`
          Obraz: \`ghcr.io/negatywistczny/stagesync:${{ env.VERSION }}\`
          EOF
          )"
