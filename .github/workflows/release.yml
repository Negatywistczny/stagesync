name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 5.0.0-alpha.10) — test only, no git commit"
        required: true
        default: "5.0.0-alpha.10"

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/negatywistczny/stagesync
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-version:
    name: resolve-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

  docker:
    name: docker-ghcr
    runs-on: ubuntu-latest
    needs: resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  tauri-macos:
    name: tauri-macos-dmg
    runs-on: macos-latest
    needs: resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version into files
        run: node launch/scripts/sync-version.mjs --version ${{ env.VERSION }}

      - name: Build desktop sidecar (Node + server + web)
        run: node launch/scripts/build-desktop-sidecar.mjs --target aarch64-apple-darwin --smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri (macOS — dmg)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  tauri-windows:
    name: tauri-windows-msi
    runs-on: windows-latest
    needs: resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Enable long paths (WiX MSI)
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version into files
        run: node launch/scripts/sync-version.mjs --version ${{ env.VERSION }}

      - name: Build desktop sidecar (Node + server + web)
        run: node launch/scripts/build-desktop-sidecar.mjs --target x86_64-pc-windows-msvc --smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Tauri (Windows — msi)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true

      - name: Upload msi artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [resolve-version, docker, tauri-macos, tauri-windows]
    # Only create a GitHub Release on tag push; dispatch is a test run.
    if: github.event_name == 'push'
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: windows-msi
          path: dist/

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: StageSync v${{ env.VERSION }}
          body: |
            ## StageSync v${{ env.VERSION }}

            ### Desktop standalone (operator)
            Pobierz instalator dla swojej platformy poniżej.
            Instalacja bez podpisu: [DESKTOP.md](https://github.com/Negatywistczny/stagesync/blob/main/docs/DESKTOP.md).
            Po uruchomieniu aplikacja startuje lokalny serwer wbudowanym Node sidecarem (bez potrzeby Dockera/Node u użytkownika).

            ---
            Pełna instrukcja: [INSTALL.md](https://github.com/Negatywistczny/stagesync/blob/main/docs/INSTALL.md)

            ### Docker (serwer / scena — ścieżka drugorzędna)
            ```sh
            docker login ghcr.io
            STAGESYNC_VERSION=${{ env.VERSION }} docker compose -f compose.prod.yml up -d
            ```
            Obraz: `ghcr.io/negatywistczny/stagesync:${{ env.VERSION }}`
          files: |
            dist/*.dmg
            dist/*.msi
            dist/SHA256SUMS.txt
          prerelease: ${{ contains(env.VERSION, '-') }}
