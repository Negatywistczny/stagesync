name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to build (e.g. 5.0.0) — no git commit"
        required: true
        default: "5.0.0"
      publish:
        description: "Create/publish GitHub Release (false = build artifacts only)"
        type: boolean
        required: false
        default: false

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE: ghcr.io/negatywistczny/stagesync
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  resolve-version:
    name: resolve-version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Building version: $VERSION"

  docker:
    name: docker-ghcr
    runs-on: ubuntu-latest
    needs: resolve-version
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: APP_VERSION=${{ env.VERSION }}
          tags: |
            ${{ env.IMAGE }}:${{ env.VERSION }}
            ${{ env.IMAGE }}:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  create-draft-release:
    name: create-draft-release
    runs-on: ubuntu-latest
    needs: resolve-version
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    outputs:
      release_id: ${{ steps.create.outputs.release_id }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Create draft GitHub Release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ env.VERSION }}"
          REPO="${{ github.repository }}"
          NOTES_FILE="$(mktemp)"
          node launch/scripts/build-release-notes.mjs "${{ env.VERSION }}" > "$NOTES_FILE"

          if gh release view "$TAG" -R "$REPO" >/dev/null 2>&1; then
            echo "Release $TAG already exists — refreshing notes/title for asset upload"
            gh release edit "$TAG" \
              -R "$REPO" \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          else
            gh release create "$TAG" \
              -R "$REPO" \
              --draft \
              --title "$TAG" \
              --notes-file "$NOTES_FILE"
          fi
          # drafts are invisible to /releases/tags/{tag}; use gh view (works for draft + published)
          ID=$(gh release view "$TAG" -R "$REPO" --json databaseId --jq .databaseId)
          if [ -z "$ID" ] || [ "$ID" = "null" ]; then
            echo "Failed to resolve release id for $TAG" >&2
            exit 1
          fi
          echo "release_id=$ID" >> "$GITHUB_OUTPUT"

  tauri-macos:
    name: tauri-macos-dmg
    runs-on: macos-latest
    needs: [resolve-version, create-draft-release]
    if: always() && needs.resolve-version.result == 'success' && (needs.create-draft-release.result == 'success' || needs.create-draft-release.result == 'skipped')
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version into files
        run: node launch/scripts/sync-version.mjs --version ${{ env.VERSION }}

      - name: Build desktop sidecar (Node + server + web)
        run: node launch/scripts/build-desktop-sidecar.mjs --target aarch64-apple-darwin --smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build Tauri (macOS — dmg + updater)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true
          releaseId: ${{ (github.event_name == 'push' || inputs.publish) && needs.create-draft-release.outputs.release_id || '' }}

      - name: Upload dmg artifact
        uses: actions/upload-artifact@v7
        with:
          name: macos-dmg
          path: apps/desktop/src-tauri/target/release/bundle/dmg/*.dmg
          if-no-files-found: error

  tauri-windows:
    name: tauri-windows-msi
    runs-on: windows-latest
    needs: [resolve-version, create-draft-release]
    if: always() && needs.resolve-version.result == 'success' && (needs.create-draft-release.result == 'success' || needs.create-draft-release.result == 'skipped')
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Prepare Windows paths (WiX)
        shell: pwsh
        run: |
          git config --global core.longpaths true
          New-ItemProperty -Path "HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem" -Name "LongPathsEnabled" -Value 1 -PropertyType DWORD -Force
          subst X: $env:GITHUB_WORKSPACE
          "GITHUB_WORKSPACE=X:\" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install JS dependencies
        run: pnpm install --frozen-lockfile

      - name: Sync version into files
        run: node launch/scripts/sync-version.mjs --version ${{ env.VERSION }} --wix-compat

      - name: Build desktop sidecar (Node + server + web)
        run: node launch/scripts/build-desktop-sidecar.mjs --target x86_64-pc-windows-msvc --smoke

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Build Tauri (Windows — msi + updater)
        uses: tauri-apps/tauri-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          RUST_LOG: tauri_bundler=debug
        with:
          projectPath: apps/desktop
          includeUpdaterJson: true
          args: --verbose
          releaseId: ${{ (github.event_name == 'push' || inputs.publish) && needs.create-draft-release.outputs.release_id || '' }}

      - name: Rename MSI without en-US locale suffix
        shell: bash
        run: |
          set -euo pipefail
          MSI_DIR="apps/desktop/src-tauri/target/release/bundle/msi"
          shopt -s nullglob
          for f in "$MSI_DIR"/*_en-US.msi; do
            base="$(basename "$f")"
            dest="$MSI_DIR/${base/_en-US/}"
            mv "$f" "$dest"
            echo "Renamed $base → $(basename "$dest")"
          done

      - name: Upload msi artifact
        uses: actions/upload-artifact@v7
        with:
          name: windows-msi
          path: apps/desktop/src-tauri/target/release/bundle/msi/*.msi
          if-no-files-found: error

  github-release:
    name: github-release
    runs-on: ubuntu-latest
    needs: [resolve-version, docker, create-draft-release, tauri-macos, tauri-windows]
    if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.publish)
    env:
      VERSION: ${{ needs.resolve-version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Download macOS artifact
        uses: actions/download-artifact@v8
        with:
          name: macos-dmg
          path: dist/

      - name: Download Windows artifact
        uses: actions/download-artifact@v8
        with:
          name: windows-msi
          path: dist/

      - name: Rename MSI and align release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ env.VERSION }}"
          REPO="${{ github.repository }}"
          cd dist
          shopt -s nullglob
          for f in *_en-US.msi; do
            dest="${f/_en-US/}"
            mv "$f" "$dest"
            echo "Renamed $f → $dest"
            # Replace draft asset uploaded by tauri-action (still had _en-US).
            gh release delete-asset "$TAG" "$f" -R "$REPO" --yes 2>/dev/null || true
            gh release upload "$TAG" "$dest" -R "$REPO" --clobber
          done
          # Keep updater manifest URLs consistent if they still mention _en-US.
          if gh release download "$TAG" -R "$REPO" -p latest.json -D . 2>/dev/null; then
            if grep -q '_en-US\.msi' latest.json; then
              sed -i 's/_en-US\.msi/.msi/g' latest.json
              gh release upload "$TAG" latest.json -R "$REPO" --clobber
              echo "Updated latest.json MSI URLs"
            fi
          fi

      - name: Generate SHA256 checksums
        run: |
          cd dist
          sha256sum *.dmg *.msi > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ env.VERSION }}"
          REPO="${{ github.repository }}"
          NOTES_FILE="$(mktemp)"
          node launch/scripts/build-release-notes.mjs "${{ env.VERSION }}" > "$NOTES_FILE"

          gh release upload "$TAG" dist/SHA256SUMS.txt -R "$REPO" --clobber

          gh release edit "$TAG" \
            -R "$REPO" \
            --draft=false \
            --latest \
            --title "$TAG" \
            --notes-file "$NOTES_FILE"
