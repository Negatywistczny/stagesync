[[permission]]
identifier = "allow-desktop-update"
description = "Check and install desktop shell updates."
commands.allow = ["check_desktop_update", "install_desktop_update"]

[[permission]]
identifier = "allow-toggle-window-fullscreen"
description = "Toggle native window expand/fullscreen from shell UI."
commands.allow = ["toggle_window_fullscreen"]

[[permission]]
identifier = "allow-open-external-url"
description = "Open documentation links in the system browser."
commands.allow = ["open_external_url"]

[[permission]]
identifier = "allow-nav-timeline-sync"
description = "Sync last Timeline project id for native menu navigation."
commands.allow = ["set_nav_timeline_project_id"]

[[permission]]
identifier = "allow-nav-recent-sync"
description = "Sync Open Recent project list for Plik menu (Faza B)."
commands.allow = ["set_nav_recent_projects"]

[[permission]]
identifier = "allow-edit-history-sync"
description = "Sync Timeline undo/redo enabled state to Edycja menu (Faza D)."
commands.allow = ["set_edit_history_state"]

[[permission]]
identifier = "allow-desktop-launcher"
description = "Launcher: bootstrap, local host, remote connect, mDNS browse, recent hosts, return."
commands.allow = [
  "get_launcher_bootstrap",
  "launcher_list_recent",
  "get_sidecar_log_tail",
  "cancel_local_host",
  "discover_lan_hosts",
  "probe_host_health",
  "connect_remote_host",
  "start_local_host",
  "return_to_launcher",
]
