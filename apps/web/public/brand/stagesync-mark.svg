<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="StageSync">
  <title>StageSync</title>
  <!-- Dark plate — readable on light & dark chrome -->
  <rect width="64" height="64" rx="14" fill="#18181b"/>
  <!-- Timeline lanes -->
  <g stroke="#3f3f46" stroke-width="2.5" stroke-linecap="round">
    <line x1="12" y1="22" x2="52" y2="22"/>
    <line x1="12" y1="32" x2="52" y2="32"/>
    <line x1="12" y1="42" x2="52" y2="42"/>
  </g>
  <!-- Synced clip blocks (aligned across lanes) -->
  <g fill="#52525b">
    <rect x="16" y="18.5" width="10" height="7" rx="1.5"/>
    <rect x="16" y="28.5" width="10" height="7" rx="1.5"/>
    <rect x="16" y="38.5" width="10" height="7" rx="1.5"/>
  </g>
  <!-- Amber playhead + cue diamond (stage / sync lock) -->
  <line x1="36" y1="12" x2="36" y2="52" stroke="#fbbf24" stroke-width="3" stroke-linecap="round"/>
  <path d="M36 8 L40.5 14 L36 16.5 L31.5 14 Z" fill="#fbbf24"/>
  <!-- Sync ticks on playhead -->
  <g stroke="#fbbf24" stroke-width="2" stroke-linecap="round">
    <line x1="31" y1="22" x2="41" y2="22"/>
    <line x1="31" y1="32" x2="41" y2="32"/>
    <line x1="31" y1="42" x2="41" y2="42"/>
  </g>
</svg>
